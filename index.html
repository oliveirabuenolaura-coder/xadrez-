<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez Web Completo</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2f3542;
            color: white;
            font-family: Arial, sans-serif;
            margin-top: 30px;
        }

        h1 { margin-bottom: 5px; }

        #status-bar {
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 25px;
            color: #f1f2f6;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 4px solid #1e222b;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.15s;
        }

        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        
        .square:hover { background-color: #d4bc96 !important; }
        .dark:hover { background-color: #9c724e !important; }

        .selected { background-color: #7a9a60 !important; }

        #reset-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #reset-btn:hover { background-color: #ff6b81; }
    </style>
</head>
<body>

    <h1>Xadrez Web</h1>
    <div id="status-bar">Vez das Brancas (PeГ§as Claras)</div>
    <div id="board"></div>
    <button id="reset-btn" onclick="resetGame()">Reiniciar Jogo</button>

    <script>
        const board = document.getElementById('board');
        const statusBar = document.getElementById('status-bar');

        const defaultBoard = [
            ['вҷң', 'вҷһ', 'вҷқ', 'вҷӣ', 'вҷҡ', 'вҷқ', 'вҷһ', 'вҷң'],
            ['вҷҹ', 'вҷҹ', 'вҷҹ', 'вҷҹ', 'вҷҹ', 'вҷҹ', 'вҷҹ', 'вҷҹ'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['вҷҷ', 'вҷҷ', 'вҷҷ', 'вҷҷ', 'вҷҷ', 'вҷҷ', 'вҷҷ', 'вҷҷ'],
            ['вҷ–', 'вҷҳ', 'вҷ—', 'вҷ•', 'вҷ”', 'вҷ—', 'вҷҳ', 'вҷ–']
        ];

        let currentBoard = JSON.parse(JSON.stringify(defaultBoard));
        const whitePieces = ['вҷҷ', 'вҷ–', 'вҷҳ', 'вҷ—', 'вҷ•', 'вҷ”'];
        const blackPieces = ['вҷҹ', 'вҷң', 'вҷһ', 'вҷқ', 'вҷӣ', 'вҷҡ'];

        let selectedSquare = null;
        let currentTurn = 'white';

        function createBoard() {
            board.innerHTML = ''; 
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    
                    if ((r + c) % 2 === 0) {
                        square.classList.add('light');
                    } else {
                        square.classList.add('dark');
                    }
                    
                    square.innerText = currentBoard[r][c];
                    square.dataset.row = r;
                    square.dataset.col = c;
                    
                    square.addEventListener('click', handleSquareClick);
                    board.appendChild(square);
                }
            }
        }

        function handleSquareClick(event) {
            const clickedSquare = event.currentTarget;
            const r = parseInt(clickedSquare.dataset.row);
            const c = parseInt(clickedSquare.dataset.col);
            const piece = clickedSquare.innerText;
            
            updateStatusText();

            if (selectedSquare) {
                const fromRow = parseInt(selectedSquare.dataset.row);
                const fromCol = parseInt(selectedSquare.dataset.col);
                
                if (clickedSquare === selectedSquare) {
                    selectedSquare.classList.remove('selected');
                    selectedSquare = null;
                    return;
                }

                currentBoard[r][c] = currentBoard[fromRow][fromCol];
                currentBoard[fromRow][fromCol] = '';
                
                selectedSquare.classList.remove('selected');
                selectedSquare = null;
                
                currentTurn = currentTurn === 'white' ? 'black' : 'white';
                updateStatusText();
                createBoard();
                
            } else {
                if (piece !== '') {
                    if (currentTurn === 'white' && !whitePieces.includes(piece)) {
                        showTemporaryMessage("вқҢ Movimento invГЎlido! Гү a vez das Brancas.");
                        return;
                    }
                    if (currentTurn === 'black' && !blackPieces.includes(piece)) {
                        showTemporaryMessage("вқҢ Movimento invГЎlido! Гү a vez das Pretas.");
                        return;
                    }

                    selectedSquare = clickedSquare;
                    clickedSquare.classList.add('selected');
                }
            }
        }

        function updateStatusText() {
            if (currentTurn === 'white') {
                statusBar.style.color = '#f1f2f6';
                statusBar.innerText = "Vez das Brancas (PeГ§as Claras)";
            } else {
                statusBar.style.color = '#ffa502';
                statusBar.innerText = "Vez das Pretas (PeГ§as Escuras)";
            }
        }

        function showTemporaryMessage(msg) {
            statusBar.style.color = '#ff4757';
            statusBar.innerText = msg;
        }

        function resetGame() {
            currentBoard = JSON.parse(JSON.stringify(defaultBoard));
            currentTurn = 'white';
            selectedSquare = null;
            updateStatusText();
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
